<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Winding Swarm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }
        body {
            background-color: #0e1126;
            height: 100vh;
            width: 100vw;
            font-family: sans-serif;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #control-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            background: rgba(14, 17, 38, 0.85);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(242, 235, 217, 0.15);
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Set to approximately 2.5 to 3 cm on standard screens */
            width: 110px; 
        }
        #ui-overlay {
            color: #f2ebd9;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 8px;
            border-bottom: 1px solid rgba(242, 235, 217, 0.1);
            padding-bottom: 4px;
            text-align: center;
        }
        #ui-overlay span {
            font-weight: bold;
            display: block;
            margin-top: 2px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        button {
            background: rgba(242, 235, 217, 0.03);
            border: 1px solid rgba(242, 235, 217, 0.12);
            padding: 5px 6px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }
        button:hover {
            background: rgba(242, 235, 217, 0.1);
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <div id="ui-overlay">Routine <span id="state-name">DOUBLE HELIX</span></div>
        <div class="btn-container" id="button-group"></div>
    </div>
    
    <canvas id="flowCanvas"></canvas>

    <script type="module">
        const canvas = document.getElementById('flowCanvas');
        const ctx = canvas.getContext('2d');
        const stateDisplay = document.getElementById('state-name');
        const buttonGroup = document.getElementById('button-group');

        // Particle colors utilized directly for the UI design elements as well
        const colors = ['#238551', '#e8a725', '#df5c34', '#d61c6b', '#f2ebd9'];
        let elements = [];
        const elementCount = 500; 
        
        let activeStateName = 'DOUBLE_HELIX';
        let currentRoutineLogic = null;

        const ROUTINE_FILES = {
            DOUBLE_HELIX: './routines/doubleHelix.js',
            SCATTERED: './routines/scattered.js',
            CIRCLING: './routines/circling.js',
            DRAGON: './routines/dragon.js',
            VORTEX: './routines/vortex.js',
            HEART: './routines/heart.js',
            CURVED_LOOP: './routines/curvedLoop.js',
            SQUARES: './routines/squares.js'
        };

        async function loadRoutine(stateName) {
            try {
                const modulePath = ROUTINE_FILES[stateName];
                const module = await import(modulePath);
                
                currentRoutineLogic = module.calculateTarget;
                activeStateName = stateName;
                
                const cleanName = stateName.replace('_', ' ');
                stateDisplay.innerText = cleanName;
                
                // Keep the active header text matching the specific button color selection
                const activeButton = document.getElementById(`btn-${stateName}`);
                if (activeButton) {
                    stateDisplay.style.color = activeButton.dataset.themeColor;
                }
            } catch (err) {
                console.error(`Failed to load standalone routine: ${stateName}`, err);
            }
        }

        function setupUI() {
            Object.keys(ROUTINE_FILES).forEach((state, index) => {
                const button = document.createElement('button');
                button.innerText = state.replace('_', ' ');
                button.id = `btn-${state}`;
                
                // Cyclically assign particle colors to individual layout buttons
                const assignedColor = colors[index % colors.length];
                button.dataset.themeColor = assignedColor;
                
                // Give buttons their custom color boundary signatures
                button.style.color = assignedColor;
                button.style.borderColor = `${assignedColor}40`; // 40 is hex opacity alpha 25%

                if (state === activeStateName) {
                    button.style.background = assignedColor;
                    button.style.color = '#0e1126';
                    button.style.boxShadow = `0 0 8px ${assignedColor}50`;
                    stateDisplay.style.color = assignedColor;
                }
                
                button.addEventListener('click', () => {
                    // Reset all button inline style profiles on swap
                    document.querySelectorAll('button').forEach(b => {
                        const bColor = b.dataset.themeColor;
                        b.style.background = 'rgba(242, 235, 217, 0.03)';
                        b.style.color = bColor;
                        b.style.boxShadow = 'none';
                    });
                    
                    // Apply heavy particle fill formatting to selection target
                    button.style.background = assignedColor;
                    button.style.color = '#0e1126';
                    button.style.boxShadow = `0 0 8px ${assignedColor}50`;
                    
                    loadRoutine(state);
                });
                buttonGroup.appendChild(button);
            });
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            if (elements.length === 0) initElements();
        }

        class SwarmElement {
            constructor(index) {
                this.index = index;
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.width = Math.random() * 8 + 5;
                this.length = Math.random() * 30 + 20;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.baseMaxSpeed = Math.random() * 2 + 2.5; 
                this.baseMaxForce = 0.2; 
                this.angle = Math.random() * Math.PI * 2;

                this.clusterOffsetOffset = Math.random() * Math.PI * 2;
                this.clusterSpreadX = (Math.random() - 0.5) * 15;
                this.clusterSpreadY = (Math.random() - 0.5) * 15;
            }

            steerTowards(targetX, targetY, speedLimit, forceLimit) {
                let desiredVx = targetX - this.x;
                let desiredVy = targetY - this.y;
                let dist = Math.hypot(desiredVx, desiredVy);

                if (dist > 0) {
                    desiredVx = (desiredVx / dist) * speedLimit;
                    desiredVy = (desiredVy / dist) * speedLimit;

                    let steerX = desiredVx - this.vx;
                    let steerY = desiredVy - this.vy;
                    
                    let steerMag = Math.hypot(steerX, steerY);
                    if (steerMag > forceLimit) {
                        steerX = (steerX / steerMag) * forceLimit;
                        steerY = (steerY / steerMag) * forceLimit;
                    }
                    this.vx += steerX;
                    this.vy += steerY;
                }
            }

            update(time) {
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                const t = this.index / elementCount; 

                let currentMaxSpeed = this.baseMaxSpeed;
                let currentMaxForce = this.baseMaxForce;

                if (currentRoutineLogic) {
                    const instruction = currentRoutineLogic(this, time, cx, cy, t, elementCount);
                    
                    currentMaxSpeed *= (instruction.speedMod || 1.0);
                    currentMaxForce *= (instruction.forceMod || 1.0);

                    if (instruction.useDirectSteer) {
                        this.steerTowards(instruction.tx, instruction.ty, currentMaxSpeed, currentMaxForce);
                    }
                }

                this.x += this.vx;
                this.y += this.vy;
                
                let speed = Math.hypot(this.vx, this.vy);
                if (speed > currentMaxSpeed) {
                    this.vx = (this.vx / speed) * currentMaxSpeed;
                    this.vy = (this.vy / speed) * currentMaxSpeed;
                }
                if (Math.hypot(this.vx, this.vy) > 0.1) {
                    this.angle = Math.atan2(this.vy, this.vx);
                }

                const margin = 50;
                if (this.x < -margin) this.x = window.innerWidth + margin;
                if (this.x > window.innerWidth + margin) this.x = -margin;
                if (this.y < -margin) this.y = window.innerHeight + margin;
                if (this.y > window.innerHeight + margin) this.y = -margin;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle + Math.PI / 2);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.width, -this.length * 0.3, -this.width * 0.3, -this.length * 0.8, 0, -this.length);
                ctx.bezierCurveTo(this.width * 0.3, -this.length * 0.8, this.width, -this.length * 0.3, 0, 0);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function initElements() {
            elements = [];
            for (let i = 0; i < elementCount; i++) {
                elements.push(new SwarmElement(i));
            }
        }

        function animate(time) {
            ctx.fillStyle = '#0e1126';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            for (let el of elements) {
                el.update(time);
                el.draw();
            }

            requestAnimationFrame(animate);
        }

        setupUI();
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        loadRoutine(activeStateName).then(() => {
            requestAnimationFrame(animate);
        });
    </script>
</body>
</html>
